<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    
</head>
<body class="bg-dark bg-gradient">
    <div class="container py-5">
       <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8">
                <div class="card shadow-lg rounded-4">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-4 text-primary fw-bold">
                            Formulario de Contacto
                        </h3>
                            <form>
                                <div class="row">
                                    <div class="col-12 col-md-6 mb-4">
                                    <label class="fw-bold">Nombre</label>
                                    <input type="text" class="form-control">
                                </div>

                                <div class="col-12 col-md-6 mb-4">
                                    <label class="fw-bold">Correo</label>
                                    <input type="email" class="form-control">
                                </div>
                            </form>
                                <textarea class="form-control mb-4" rows="5"></textarea>
                                <div class="row">
                                    <div class="col-6 col-md-6 mb-4">
                                    <label class="fw-bold">Estado civil</label>
                                        <div class="form-check">
                                            <input type="radio" class="form-check-input">
                                            <label class="form-label">Soltero</label>
                                        </div>
                                    </div>
                                 <div class="col-6 col-md-6 mb-4">
                                    <label class="fw-bold">Pais</label>
                                    <select class="form-select">
                                        <option>Argentina</option>
                                        <option>España</option>
                                    </select>
                                    
                                 </div>
                                    <div class="form-check mb-4">
                                        <input type="checkbox" class="form-check-input">
                                        <label class="fw-bold">Acepto términos</label>
                                    </div>
                    </div>
                    <button class="btn btn-primary px-5 py-2 fw-bold shadow text-center">    
                    Enviar
                    </button>

                </div>

            </div>
       </div>

      

    </div>
</body>
</html>
